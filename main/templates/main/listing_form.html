{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white pb-0 border-bottom-0 pt-4 px-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">{% if is_update %}Edit Listing: {{ listing.title }}{% else %}Create New Listing{% endif %}</h3>
                        <a href="{% if is_update %}{% url 'my_listings' %}{% else %}{% url 'dashboard' %}{% endif %}" class="btn btn-sm btn-outline-secondary">Back</a>
                    </div>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                {% if is_update %}Save Changes{% else %}Publish Listing{% endif %}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
